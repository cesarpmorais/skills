name: Skill evals

on:
  push:
    branches: [main]
    paths:
      - "**/evals/evals.json"
      - "**/SKILL.md"
      - "run_evals.py"
      - ".github/workflows/evals.yml"
  pull_request:
    paths:
      - "**/evals/evals.json"
      - "**/SKILL.md"
      - "run_evals.py"
      - ".github/workflows/evals.yml"
  workflow_dispatch: {}

concurrency:
  group: skill-evals-${{ github.ref }}
  cancel-in-progress: true

env:
  # Cheap/fast OpenAI tier — the Codex-side equivalent of Claude Haiku for
  # trigger evals. Double-check this is still current before relying on it;
  # OpenAI's mini/nano naming shifts across releases. This CLI build (0.144.0)
  # warns "Model metadata not found, defaulting to fallback" for this id — soft,
  # non-fatal (falls back to generic metadata), but worth an eye once real API
  # calls are flowing to confirm it isn't silently degrading eval quality.
  EVAL_MODEL: gpt-5-mini

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Log in to Codex (headless, API key)
        env:
          # Add this as a repo secret: Settings -> Secrets and variables -> Actions.
          # This is an OpenAI API key (from platform.openai.com), not a Claude token.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Run evals for every skill that has an eval set
        run: |
          set -e
          status=0
          for evals_json in */evals/evals.json; do
            skill="$(dirname "$(dirname "$evals_json")")"
            echo "::group::evals — $skill"
            # --skip-git-repo-check: each trial runs in a fresh, isolated, empty
            # tempdir (by design, for a clean workspace) — never a git repo, so
            # Codex's trust check would otherwise refuse to run there.
            python3 run_evals.py "$skill" \
              --harness-cmd "codex exec -s workspace-write --skip-git-repo-check -m $EVAL_MODEL {prompt}" \
              || status=1
            echo "::endgroup::"
          done
          exit $status

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: "*/evals/results/**"
          if-no-files-found: ignore
